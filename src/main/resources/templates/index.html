<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-5">
        <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}" class="mb-3 text-end">
            <a href="/admin/page/home/edit" class="btn btn-sm btn-outline-secondary">
                <i class="fas fa-edit"></i> Редактировать
            </a>
        </div>

        <div class="jumbotron text-center p-5 rounded" 
             style="background-color: var(--bg-card); color: var(--text-body); border: 1px solid var(--border-color); box-shadow: var(--shadow-card);">

            <div th:utext="${content}"></div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
