<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-5">
        <!-- Убираем bg-light, используем кастомный класс -->
        <div class="jumbotron text-center p-5 rounded" style="background-color: var(--bg-card); color: var(--text-body); border: 1px solid var(--border-color); box-shadow: var(--shadow-card);">
            <h1 class="display-4">🚗 Электронный гараж</h1>
            <p class="lead">Управляйте своей техникой, ремонтами, расходами и страховками в одном месте.</p>
            <hr class="my-4" style="border-color: var(--border-color);">
            <p>Войдите или зарегистрируйтесь, чтобы начать пользоваться всеми возможностями.</p>
            <a th:href="@{/login}" class="btn btn-primary btn-lg me-2">Войти</a>
            <a th:href="@{/register}" class="btn btn-secondary btn-lg">Регистрация</a>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
