<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="card">
            <div class="card-header">
                <h4 th:text="${isEdit} ? 'Редактирование ТС' : 'Добавление ТС'"></h4>
            </div>
            <div class="card-body">
                <form th:action="${isEdit} ? @{/vehicles/edit/{id}(id=${vehicleId})} : @{/vehicles/add}"
                      th:object="${vehicle}" method="post" enctype="multipart/form-data">
                    <div class="row">
                        <!-- Тип -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Тип</label>
                            <select class="form-select" id="typeSelect" th:field="*{type}">
                                <option value="Автомобиль">Автомобиль</option>
                                <option value="Мототехника">Мототехника</option>
                                <option value="Снегоход">Снегоход</option>
                                <option value="Квадроцикл">Квадроцикл</option>
                                <option value="Лодка">Лодка</option>
                                <option value="Другое">Другое</option>
                            </select>
                        </div>

                        <!-- Название (скрыто, если не "Другое") -->
                        <div class="col-md-6 mb-3" id="nameGroup">
                            <label class="form-label">Название <span id="nameRequired" style="display: none;">*</span></label>
                            <input type="text" class="form-control" th:field="*{name}" id="nameInput">
                            <div class="form-text text-muted">Обязательно только при выборе типа "Другое"</div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Марка</label>
                            <input type="text" class="form-control" th:field="*{brand}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Модель</label>
                            <input type="text" class="form-control" th:field="*{model}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Год выпуска</label>
                            <input type="number" class="form-control" th:field="*{year}" min="1900" max="2100">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">VIN</label>
                            <input type="text" class="form-control" th:field="*{vin}" maxlength="17">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Госномер</label>
                            <input type="text" class="form-control" th:field="*{licensePlate}">
                        </div>

                        <!-- Пробег / моточасы -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label" id="odometerLabel">Начальный пробег</label>
                            <div class="input-group">
                                <input type="number" class="form-control" th:field="*{initialOdometer}" min="0" step="1" id="odometerInput">
                                <span class="input-group-text" id="odometerUnitDisplay">км</span>
                            </div>
                            <div class="mt-2">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" th:field="*{odometerUnit}" value="km" id="unitKm" checked>
                                    <label class="form-check-label" for="unitKm">км</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" th:field="*{odometerUnit}" value="mh" id="unitMh">
                                    <label class="form-check-label" for="unitMh">моточасы (м/ч)</label>
                                </div>
                            </div>
                            <div class="form-text text-muted">Выберите единицу измерения</div>
                        </div>

                        <!-- Фото ТС -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Фото ТС</label>
                            <input type="file" class="form-control" name="photoFile" accept="image/*">
                            <div class="form-text text-muted">Необязательно</div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> <span th:text="${isEdit} ? 'Обновить' : 'Сохранить'"></span>
                    </button>
                    <a th:href="${isEdit} ? @{/vehicles/{id}(id=${vehicleId})} : @{/vehicles}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. Показ поля "Название" для "Другое"
            const typeSelect = document.getElementById('typeSelect');
            const nameGroup = document.getElementById('nameGroup');
            const nameInput = document.getElementById('nameInput');
            const nameRequired = document.getElementById('nameRequired');

            function toggleNameField() {
                if (typeSelect.value === 'Другое') {
                    nameGroup.style.display = 'block';
                    nameRequired.style.display = 'inline';
                    nameInput.required = true;
                } else {
                    nameGroup.style.display = 'none';
                    nameRequired.style.display = 'none';
                    nameInput.required = false;
                }
            }

            // 2. Синхронизация единиц измерения
            const unitKm = document.getElementById('unitKm');
            const unitMh = document.getElementById('unitMh');
            const odometerInput = document.getElementById('odometerInput');
            const odometerUnitDisplay = document.getElementById('odometerUnitDisplay');
            const odometerLabel = document.getElementById('odometerLabel');

            function updateOdometerUnit() {
                if (unitKm.checked) {
                    odometerLabel.textContent = 'Начальный пробег';
                    odometerUnitDisplay.textContent = 'км';
                    odometerInput.step = 1;
                    odometerInput.placeholder = 'Пробег в км';
                } else if (unitMh.checked) {
                    odometerLabel.textContent = 'Начальные моточасы';
                    odometerUnitDisplay.textContent = 'м/ч';
                    odometerInput.step = 0.1;
                    odometerInput.placeholder = 'Моточасы';
                }
            }

            typeSelect.addEventListener('change', toggleNameField);
            unitKm.addEventListener('change', updateOdometerUnit);
            unitMh.addEventListener('change', updateOdometerUnit);

            toggleNameField();
            updateOdometerUnit();
        });
    </script>
</body>
</html>
