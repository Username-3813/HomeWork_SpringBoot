<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h4 th:text="${isEdit} ? 'Редактирование ремонта' : 'Добавление ремонта'"></h4>
            </div>
            <div class="card-body">
                <form th:action="${isEdit} ? @{/repairs/edit/{id}(id=${repairId})} : @{/repairs/add/{vehicleId}(vehicleId=${vehicleId})}"
                      th:object="${repair}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Дата *</label>
                            <input type="date" class="form-control" th:field="*{date}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Пробег (км) *</label>
                            <input type="number" class="form-control" th:field="*{odometer}" required>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Описание *</label>
                            <textarea class="form-control" th:field="*{description}" rows="3" required></textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Стоимость (руб) *</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{cost}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">СТО</label>
                            <input type="text" class="form-control" th:field="*{workshop}">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> <span th:text="${isEdit} ? 'Обновить' : 'Сохранить'"></span>
                    </button>
                    <!-- Исправленная кнопка "Отмена" -->
                    <a th:href="@{/vehicles/{id}(id=${vehicleId})}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
