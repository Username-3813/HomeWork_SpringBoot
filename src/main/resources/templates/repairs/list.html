<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>История ремонтов</h2>
            <a th:href="@{/repairs/add/{vehicleId}(vehicleId=${vehicleId})}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Добавить ремонт
            </a>
        </div>

        <div th:if="${repairs.isEmpty()}" class="alert alert-info">
            Для этого ТС пока нет записей о ремонтах.
        </div>

        <div th:unless="${repairs.isEmpty()}" class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Пробег (км)</th>
                        <th>Описание</th>
                        <th>Стоимость (руб)</th>
                        <th>СТО</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${repairs}">
                        <td th:text="${#temporals.format(r.date, 'dd.MM.yyyy')}"></td>
                        <td th:text="${r.odometer}"></td>
                        <td th:text="${r.description}"></td>
                        <td th:text="${r.cost}"></td>
                        <td th:text="${r.workshop}"></td>
                        <td>
                            <a th:href="@{/repairs/edit/{id}(id=${r.id})}" class="btn btn-sm btn-warning">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/repairs/delete/{id}(id=${r.id})}" class="btn btn-sm btn-danger"
                               onclick="return confirm('Удалить запись?')">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Кнопка "Назад к ТС" -->
        <a th:href="@{/vehicles/{id}(id=${vehicleId})}" class="btn btn-secondary mt-3">
            <i class="fas fa-arrow-left"></i> Назад к ТС
        </a>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
