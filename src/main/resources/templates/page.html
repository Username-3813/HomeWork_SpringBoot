<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <!-- Кнопка редактирования для администратора (справа) -->
        <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}" class="mb-3 text-end">
            <a th:href="@{/admin/page/{page}/edit(page=${page})}" class="btn btn-sm btn-outline-secondary">
                <i class="fas fa-edit"></i> Редактировать
            </a>
        </div>

        <!-- Контент страницы с корректными цветами -->
        <div class="page-content" style="color: var(--text-body);">
            <div th:utext="${content}"></div>
        </div>

        <a href="/" class="btn btn-secondary mt-3">
            <i class="fas fa-arrow-left"></i> На главную
        </a>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
