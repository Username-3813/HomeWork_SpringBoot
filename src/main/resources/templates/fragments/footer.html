<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ===== FOOTER ===== -->
<footer th:fragment="footer">
    <div class="container">
        <hr>
        <div class="row">
            <div class="col-md-6">
                <p class="text-muted small">
                    &copy; 2026 Электронный гараж.
                    <span th:text="${#dates.format(#dates.createNow(), 'dd-MM-yyyy')}"></span>
                </p>
            </div>
            <div class="col-md-6 text-end">
                <a href="/about" class="text-muted small me-2">О проекте</a>
                <span th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a href="/admin/page/about/edit" class="text-muted small me-2">Ред. "О проекте"</a>
                </span>
                <a href="/contacts" class="text-muted small me-2">Контакты</a>
                <span th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <a href="/admin/page/contacts/edit" class="text-muted small">Ред. "Контакты"</a>
                </span>
            </div>
        </div>
    </div>
</footer>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</div>
</html>
