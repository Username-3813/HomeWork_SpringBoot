<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card">
            <div class="card-header">
                <h4>Добавление расхода</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/expenses/add/{vehicleId}(vehicleId=${vehicleId})}"
                      th:object="${expense}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Категория *</label>
                            <select class="form-select" th:field="*{category}" required>
                                <option value="REPAIR">Ремонт</option>
                                <option value="FUEL">Топливо</option>
                                <option value="FINE">Штраф</option>
                                <option value="WASH">Мойка</option>
                                <option value="OTHER">Прочее</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Дата *</label>
                            <input type="date" class="form-control" th:field="*{date}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Сумма (руб) *</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{amount}" required>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Описание</label>
                            <textarea class="form-control" th:field="*{description}" rows="2"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Сохранить
                    </button>
                    <a th:href="@{/vehicles/{id}(id=${vehicleId})}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
