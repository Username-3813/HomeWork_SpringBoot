<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <h2>Календарь напоминаний</h2>

        <div th:if="${totalItems == 0}" class="alert alert-info">
            Нет ни одного напоминания.
        </div>

        <div th:unless="${totalItems == 0}">
            <div th:each="entry : ${groupedNotifications}">
                <h4 th:text="${#temporals.format(entry.key, 'dd MMMM yyyy')}"></h4>
                <hr>
                <div th:each="n : ${entry.value}" class="card mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="card-title">
                                    <span class="badge" th:class="${n.type == 'MAINTENANCE'} ? 'bg-warning' : 'bg-info'">
                                    </span>
                                    <span th:text="${n.title}"></span>
                                </h5>
                                <p class="card-text mt-1">
                                    <span th:if="${n.brand != null and n.model != null}" th:text="${n.brand + ' ' + n.model}"></span>
                                    <span th:if="${n.brand == null or n.model == null}" th:text="${n.vehicleName}"></span>
                                    <span class="badge bg-secondary" th:text="${n.vehicleType == 'Другое' ? n.vehicleName : n.vehicleType}"></span>
                                </p>
                                <p class="card-text" th:if="${n.cost != null}">
                                    <strong>Стоимость:</strong> <span th:text="${n.cost}"></span> руб.
                                </p>
                                <p class="card-text" th:text="${n.description != null and !n.description.isEmpty()} ? ${n.description} : 'Нет описания'"></p>
                            </div>
                            <div>
                                <span th:if="${n.type == 'MAINTENANCE' and n.isDone != null and n.isDone}" class="badge bg-success">
                                    <i class="fas fa-check"></i> Выполнено
                                </span>
                                <span th:if="${n.type == 'MAINTENANCE' and n.isDone != null and !n.isDone}" class="badge bg-warning">
                                    <i class="fas fa-clock"></i> Ожидается
                                </span>
                                <span th:if="${n.type == 'INSURANCE'}" class="badge bg-info">
                                    <i class="fas fa-shield-alt"></i> Активна
                                </span>
                            </div>
                        </div>

                        <a th:if="${n.type == 'MAINTENANCE'}" 
                           th:href="@{/reminders/vehicle/{id}(id=${n.vehicleId}, from='calendar')}" 
                           class="btn btn-sm btn-primary mt-2">Подробнее →</a>
                        <a th:if="${n.type == 'INSURANCE'}" 
                           th:href="@{/insurances/vehicle/{id}(id=${n.vehicleId}, from='calendar')}" 
                           class="btn btn-sm btn-primary mt-2">Подробнее →</a>
                    </div>
                </div>
            </div>

            <div th:if="${totalPages > 1}" class="d-flex justify-content-center mt-4">
                <nav>
                    <ul class="pagination pagination-sm">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/calendar(page=${currentPage - 1}, size=${size})}">&laquo;</a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            class="page-item" th:classappend="${i == currentPage} ? 'active' : ''">
                            <a class="page-link" th:href="@{/calendar(page=${i}, size=${size})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/calendar(page=${currentPage + 1}, size=${size})}">&raquo;</a>
                        </li>
                    </ul>
                </nav>
            </div>

            <div class="text-muted small text-center mt-2">
                Показано <span th:text="${pageSize}"></span> из <span th:text="${totalItems}"></span> записей
            </div>
        </div>

        <a href="/vehicles" class="btn btn-secondary mt-3">
            <i class="fas fa-arrow-left"></i> Назад к списку ТС
        </a>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
