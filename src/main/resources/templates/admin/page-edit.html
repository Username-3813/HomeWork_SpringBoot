<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h4>Редактирование страницы</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/page/{page}/edit(page=${page})}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Содержимое (HTML)</label>
                        <textarea class="form-control" name="content" rows="10" th:text="${content}"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Сохранить
                    </button>
                    <a th:href="@{${page == 'home' ? '/' : page == 'about' ? '/about' : '/contacts'}}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
