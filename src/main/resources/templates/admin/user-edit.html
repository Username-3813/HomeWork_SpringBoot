<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <h2>Редактирование пользователя</h2>
        <form th:action="@{/admin/user/{id}/edit(id=${userId})}" th:object="${profile}" method="post">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">Фамилия</label>
                <input type="text" class="form-control" th:field="*{lastName}">
            </div>
            <div class="mb-3">
                <label class="form-label">Имя</label>
                <input type="text" class="form-control" th:field="*{firstName}">
            </div>
            <div class="mb-3">
                <label class="form-label">Отчество</label>
                <input type="text" class="form-control" th:field="*{patronymic}">
            </div>
            <div class="mb-3">
                <label class="form-label">Дата рождения</label>
                <input type="date" class="form-control" th:field="*{birthDate}">
            </div>
            <div class="mb-3">
                <label class="form-label">Телефон</label>
                <input type="tel" class="form-control" th:field="*{phone}">
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="/admin/users" class="btn btn-secondary">Отмена</a>
        </form>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
