<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <h2>👥 Пользователи</h2>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>ФИО</th>
                        <th>Роль</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${userPage.content}">
                        <td th:text="${u.id}"></td>
                        <td th:text="${u.email}"></td>
                        <td th:text="${u.fullName}"></td>
                        <td>
                            <span class="badge" th:class="${u.role == 'ADMIN'} ? 'bg-success' : 'bg-secondary'">
                                <span th:text="${u.role == 'ADMIN' ? 'Администратор' : 'Пользователь'}"></span>
                            </span>
                        </td>
                        <td>
                            <!-- Кнопки для управления ролью -->
                            <a th:if="${u.role == 'USER'}" 
                               th:href="@{/admin/promote/{id}(id=${u.id})}" 
                               class="btn btn-sm btn-warning">
                                Сделать админом
                            </a>
                            <a th:if="${u.role == 'ADMIN'}" 
                               th:href="@{/admin/demote/{id}(id=${u.id})}" 
                               class="btn btn-sm btn-secondary">
                                Убрать из админа
                            </a>
                            <!-- Существующие кнопки -->
                            <a th:href="@{/admin/user/{id}/vehicles(id=${u.id})}" class="btn btn-sm btn-info">ТС</a>
                            <a th:href="@{/admin/user/{id}/expenses(id=${u.id})}" class="btn btn-sm btn-success">Расходы</a>
                            <a th:href="@{/admin/user/{id}/edit(id=${u.id})}" class="btn btn-sm btn-warning">Изменить</a>
                            <a th:href="@{/admin/user/{id}/delete(id=${u.id})}" class="btn btn-sm btn-danger">Удалить</a>
                        </td>
                    </tr>
                    <tr th:if="${userPage.isEmpty()}">
                        <td colspan="5" class="text-center">Нет пользователей</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Пагинация -->
        <div th:if="${totalPages > 1}" class="d-flex justify-content-center mt-4">
            <nav>
                <ul class="pagination pagination-sm">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                        <a class="page-link" th:href="@{/admin/users(page=${currentPage - 1}, size=${size})}">&laquo;</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        class="page-item" th:classappend="${i == currentPage} ? 'active' : ''">
                        <a class="page-link" th:href="@{/admin/users(page=${i}, size=${size})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
                        <a class="page-link" th:href="@{/admin/users(page=${currentPage + 1}, size=${size})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>

        <div class="text-muted small text-center mt-2">
            Показано <span th:text="${pageSize}"></span> из <span th:text="${totalItems}"></span> записей
        </div>

        <a href="/vehicles" class="btn btn-secondary mt-3">
            <i class="fas fa-arrow-left"></i> Назад
        </a>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
