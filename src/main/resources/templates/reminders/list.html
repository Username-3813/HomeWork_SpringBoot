<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
            <h2>Напоминания</h2>
            <a th:href="@{/reminders/add/{vehicleId}(vehicleId=${vehicleId})}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Добавить напоминание
            </a>
        </div>

        <div th:if="${reminders.isEmpty()}" class="alert alert-info">
            Напоминаний пока нет.
        </div>

        <div th:unless="${reminders.isEmpty()}" class="table-responsive">
            <table class="table table-hover table-striped align-middle">
                <thead>
                    <tr>
                        <th>Заголовок</th>
                        <th>Описание</th>
                        <th>Дата выполнения</th>
                        <th>Стоимость (руб)</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${reminders}">
                        <td th:text="${r.title}"></td>
                        <td th:text="${r.description}"></td>
                        <td th:text="${#temporals.format(r.dueDate, 'dd.MM.yyyy')}"></td>
                        <td th:text="${r.estimatedCost}"></td>
                        <td>
                            <span class="badge" th:class="${r.isDone} ? 'bg-success' : 'bg-warning'">
                                <span th:text="${r.isDone} ? 'Выполнено' : 'Ожидается'"></span>
                            </span>
                        </td>
                        <td>
                            <div class="btn-group btn-group-sm" role="group">
                                <a th:href="@{/reminders/edit/{id}(id=${r.id})}" class="btn btn-warning">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:if="${!r.isDone}" th:href="@{/reminders/done/{id}(id=${r.id})}" class="btn btn-success">
                                    <i class="fas fa-check"></i>
                                </a>
                                <a th:href="@{/reminders/delete/{id}(id=${r.id})}" class="btn btn-danger"
                                   onclick="return confirm('Удалить запись?')">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-3">
            <a th:if="${from == 'calendar'}" href="/calendar" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Назад
            </a>
            <a th:unless="${from == 'calendar'}" th:href="@{/vehicles/{id}(id=${vehicleId})}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Назад к ТС
            </a>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
