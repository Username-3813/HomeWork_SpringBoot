<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h4 th:text="${isEdit} ? 'Редактирование напоминания' : 'Добавление напоминания'"></h4>
            </div>
            <div class="card-body">
                <form th:action="${isEdit} ? @{/reminders/edit/{id}(id=${reminderId})} : @{/reminders/add/{vehicleId}(vehicleId=${vehicleId})}"
                      th:object="${reminder}" method="post">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Тип напоминания *</label>
                            <select class="form-select" id="reminderTypeSelect" th:field="*{reminderType}" required>
                                <option value="">Выберите тип</option>
                                <option value="Техническое обслуживание">Техническое обслуживание</option>
                                <option value="Замена масла">Замена масла</option>
                                <option value="Плановая запись в автосервис">Плановая запись в автосервис</option>
                                <option value="Другое">Другое...</option>
                            </select>
                        </div>

                        <div class="col-md-12 mb-3" id="customTitleGroup" style="display: none;">
                            <label class="form-label">Название напоминания *</label>
                            <input type="text" class="form-control" th:field="*{customTitle}" placeholder="Введите название">
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label">Описание</label>
                            <textarea class="form-control" th:field="*{description}" rows="2"></textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Дата выполнения *</label>
                            <input type="date" class="form-control" th:field="*{dueDate}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ориентировочная стоимость (руб)</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{estimatedCost}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Напоминать за (дней)</label>
                            <input type="number" class="form-control" th:field="*{reminderDaysBefore}" min="1">
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-check form-switch mt-4">
                                <input class="form-check-input" type="checkbox" th:field="*{isDone}">
                                <label class="form-check-label">Выполнено</label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> <span th:text="${isEdit} ? 'Обновить' : 'Сохранить'"></span>
                    </button>
                    <!-- Исправленная кнопка "Отмена" -->
                    <a th:href="@{/vehicles/{id}(id=${vehicleId})}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Показываем/скрываем поле customTitle при выборе "Другое"
        document.addEventListener('DOMContentLoaded', function() {
            var select = document.getElementById('reminderTypeSelect');
            var customGroup = document.getElementById('customTitleGroup');
            var customInput = customGroup.querySelector('input');

            function toggleCustom() {
                if (select.value === 'Другое') {
                    customGroup.style.display = 'block';
                    customInput.required = true;
                } else {
                    customGroup.style.display = 'none';
                    customInput.required = false;
                }
            }

            select.addEventListener('change', toggleCustom);
            toggleCustom();
        });
    </script>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
