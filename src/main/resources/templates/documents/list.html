<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Документы</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#documentModal">
                <i class="fas fa-plus"></i> Добавить документ
            </button>
        </div>

        <div th:if="${documents.isEmpty()}" class="alert alert-info">
            Документов пока нет.
        </div>

        <div th:unless="${documents.isEmpty()}" class="row row-cols-1 row-cols-md-2 g-4">
            <div th:each="doc : ${documents}" class="col">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${doc.name}"></h5>
                        <ul class="list-unstyled small">
                            <li><strong>Тип:</strong> <span th:text="${doc.type}"></span></li>
                            <li><strong>Размер:</strong> <span th:text="${doc.fileSize}"></span> байт</li>
                            <li><strong>Загружен:</strong> <span th:text="${#temporals.format(doc.uploadedAt, 'dd.MM.yyyy HH:mm')}"></span></li>
                            <li>
                                <strong>Файл:</strong>
                                <a th:href="@{'/' + ${doc.filePath}}" target="_blank">
                                    <i class="fas fa-file"></i> Открыть
                                </a>
                            </li>
                        </ul>
                    </div>
                    <div class="card-footer bg-transparent border-top-0 d-flex justify-content-end">
                        <a th:href="@{/documents/delete/{id}(id=${doc.id})}" class="btn btn-sm btn-danger"
                           onclick="return confirm('Удалить документ?')">
                            <i class="fas fa-trash"></i> Удалить
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <a th:href="@{/vehicles/{id}(id=${vehicleId})}" class="btn btn-secondary mt-3">
            <i class="fas fa-arrow-left"></i> Назад к ТС
        </a>
    </div>

    <!-- Модальное окно для загрузки документа -->
    <div class="modal fade" id="documentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Загрузить документ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form th:action="@{/documents/upload}" method="post" enctype="multipart/form-data">
                        <input type="hidden" name="vehicleId" th:value="${vehicleId}">
                        <div class="mb-3">
                            <label class="form-label">Название документа *</label>
                            <input type="text" class="form-control" name="documentName" placeholder="Например: ПТС, Договор, Сервисная книжка" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Файл (PDF, JPG, PNG)</label>
                            <input type="file" class="form-control" name="file" accept=".pdf,.jpg,.jpeg,.png" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Загрузить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
