<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Страховки</h2>
            <a th:href="@{/insurances/add/{vehicleId}(vehicleId=${vehicleId})}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Добавить страховку
            </a>
        </div>

        <div th:if="${insurances.isEmpty()}" class="alert alert-info">
            Страховок пока нет. <a th:href="@{/insurances/add/{vehicleId}(vehicleId=${vehicleId})}">Добавить страховку</a>
        </div>

        <div th:unless="${insurances.isEmpty()}" class="row row-cols-1 row-cols-md-2 g-4">
            <div th:each="ins : ${insurances}" class="col">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">
                            <span th:text="${ins.policyNumber}"></span>
                            <!-- Перевод типа страховки на русский -->
                            <span class="badge bg-secondary">
                                <span th:switch="${ins.type}">
                                    <span th:case="'OSAGO'">ОСАГО</span>
                                    <span th:case="'CASCO'">КАСКО</span>
                                    <span th:case="'LIFE'">Другое</span>
                                    <span th:case="*" th:text="${ins.type}"></span>
                                </span>
                            </span>
                        </h5>
                        <ul class="list-unstyled small">
                            <li><strong>Компания:</strong> <span th:text="${ins.company ?: '—'}"></span></li>
                            <li><strong>Дата начала:</strong> <span th:text="${#temporals.format(ins.startDate, 'dd.MM.yyyy')}"></span></li>
                            <li><strong>Дата окончания:</strong> <span th:text="${#temporals.format(ins.endDate, 'dd.MM.yyyy')}"></span></li>
                            <li><strong>Стоимость:</strong> <span th:text="${ins.cost}"></span> руб.</li>
                            <li th:if="${ins.frontDocumentUrl != null and !ins.frontDocumentUrl.isEmpty()}">
                                <strong>Лицевая сторона:</strong>
                                <a th:href="@{'/' + ${ins.frontDocumentUrl}}" target="_blank" style="color: var(--text-link);">
                                    <i class="fas fa-file-image"></i> Открыть
                                </a>
                            </li>
                            <li th:if="${ins.backDocumentUrl != null and !ins.backDocumentUrl.isEmpty()}">
                                <strong>Обратная сторона:</strong>
                                <a th:href="@{'/' + ${ins.backDocumentUrl}}" target="_blank" style="color: var(--text-link);">
                                    <i class="fas fa-file-image"></i> Открыть
                                </a>
                            </li>
                            <li th:unless="${ins.frontDocumentUrl != null or ins.backDocumentUrl != null}">
                                <span class="text-muted">Файлы не загружены</span>
                            </li>
                        </ul>
                    </div>
                    <div class="card-footer d-flex justify-content-end gap-2" style="background-color: var(--bg-card-header); border-top: 1px solid var(--border-color);">
                        <a th:href="@{/insurances/edit/{id}(id=${ins.id})}" class="btn btn-sm btn-warning">
                            <i class="fas fa-edit"></i> Редактировать
                        </a>
                        <a th:href="@{/insurances/delete/{id}(id=${ins.id})}" class="btn btn-sm btn-danger"
                           onclick="return confirm('Удалить запись?')">
                            <i class="fas fa-trash"></i> Удалить
                        </a>
                    </div>
                </div>
            </div>
        </div>

       <a th:if="${from == 'calendar'}" href="/calendar" class="btn btn-secondary mt-3">
            <i class="fas fa-arrow-left"></i> Назад
        </a>
        <a th:unless="${from == 'calendar'}" th:href="@{/vehicles/{id}(id=${vehicleId})}" class="btn btn-secondary mt-3">
            <i class="fas fa-arrow-left"></i> Назад к ТС
        </a>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>
</body>
</html>
