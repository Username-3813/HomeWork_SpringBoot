<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container mt-4">
        <h2>🔒 Смена пароля</h2>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/profile/password}" th:object="${passwordChange}" method="post">
            <div class="mb-3">
                <label class="form-label">Текущий пароль</label>
                <div class="input-group">
                    <input type="password" class="form-control" th:field="*{currentPassword}" id="currentPassword" required>
                    <button class="btn btn-outline-secondary" type="button" id="toggleCurrentPassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Новый пароль (мин. 6 символов)</label>
                <div class="input-group">
                    <input type="password" class="form-control" th:field="*{newPassword}" id="newPassword" required>
                    <button class="btn btn-outline-secondary" type="button" id="toggleNewPassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="form-text text-muted">Минимум 6 символов</div>
            </div>
            <div class="mb-3">
                <label class="form-label">Подтверждение нового пароля</label>
                <div class="input-group">
                    <input type="password" class="form-control" th:field="*{confirmPassword}" id="confirmPassword" required>
                    <button class="btn btn-outline-secondary" type="button" id="toggleConfirmPassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Изменить пароль</button>
            <a href="/profile" class="btn btn-secondary">Отмена</a>
        </form>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
    <div th:replace="fragments/footer :: scripts"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            function togglePassword(inputId, buttonId) {
                const input = document.getElementById(inputId);
                const button = document.getElementById(buttonId);
                button.addEventListener('click', function() {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    this.querySelector('i').classList.toggle('fa-eye');
                    this.querySelector('i').classList.toggle('fa-eye-slash');
                });
            }
            togglePassword('currentPassword', 'toggleCurrentPassword');
            togglePassword('newPassword', 'toggleNewPassword');
            togglePassword('confirmPassword', 'toggleConfirmPassword');
        });
    </script>
</body>
</html>
